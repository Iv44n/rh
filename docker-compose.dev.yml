services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rh_user
      POSTGRES_PASSWORD: rh_password
      POSTGRES_DB: rh_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rh_user -d rh_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./api/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CI: "true"
      DATABASE_URL: "postgresql://rh_user:rh_password@postgres:5432/rh_db"
    ports:
      - "3001:3001"
    volumes:
      - ./api:/app
      - /app/node_modules
      - pnpm_store:/pnpm/store
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  pnpm_store:
